<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 GPIO Master</title>
  <style>
    /* ── Design-System ─────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --bg:        #080d14;
      --surface:   #0e1621;
      --card:      #131d2d;
      --border:    rgba(56, 189, 248, 0.15);
      --accent:    #38bdf8;
      --accent2:   #0ea5e9;
      --on:        #22c55e;
      --off:       #ef4444;
      --warn:      #f59e0b;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --font-ui:   'Rajdhani', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 16px;
      min-height: 100vh;
      padding: 16px;
      /* Subtiles Gitter-Muster */
      background-image:
        linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .wrapper {
      max-width: 560px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    h1 {
      font-family: var(--font-ui);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--accent);
      line-height: 1;
    }
    h1 small { display: block; font-size: .75rem; color: var(--muted); font-weight: 400; margin-top: 3px; }

    /* ── Verbindungsstatus ──────────────────────────────── */
    #conn-badge {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-family: var(--font-mono);
      background: rgba(100,116,139,.2);
      color: var(--muted);
      border: 1px solid var(--border);
      white-space: nowrap;
      transition: .4s;
    }
    #conn-badge.online  { background: rgba(34,197,94,.12); color: var(--on); border-color: rgba(34,197,94,.3); }
    #conn-badge.offline { background: rgba(239,68,68,.12); color: var(--off); border-color: rgba(239,68,68,.3); }

    /* ── Karten ─────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: .5;
    }

    .card-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    /* ── Outputs ─────────────────────────────────────────── */
    .pin-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .pin-row:last-child { border-bottom: none; }

    .pin-label {
      flex: 1;
      min-width: 0;
    }
    .pin-label strong {
      display: block;
      font-size: .95rem;
      font-weight: 600;
    }
    .pin-label span {
      font-size: .75rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Toggle-Schalter */
    .toggle {
      position: relative;
      width: 48px; height: 26px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #1e293b;
      border-radius: 13px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: .3s;
    }
    .toggle input:checked + .toggle-track { background: var(--on); border-color: var(--on); }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      transition: .25s cubic-bezier(.34,1.56,.64,1);
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(22px); }

    /* LED-Indikator */
    .led {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1e293b;
      flex-shrink: 0;
      transition: .3s;
    }
    .led.on  { background: var(--on);  box-shadow: 0 0 8px var(--on); }
    .led.off { background: var(--off); box-shadow: 0 0 6px var(--off); }

    /* PWM-Slider */
    .pwm-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #1e293b;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: .15s;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.3); }
    .pwm-val {
      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--accent);
      min-width: 28px;
      text-align: right;
    }

    /* ── Inputs ──────────────────────────────────────────── */
    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .input-row:last-child { border-bottom: none; }

    .input-val {
      font-family: var(--font-mono);
      font-size: .8rem;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(0,0,0,.3);
      border: 1px solid var(--border);
      min-width: 74px;
      text-align: center;
    }
    .input-val.high { color: var(--on);  border-color: rgba(34,197,94,.4); }
    .input-val.low  { color: var(--off); border-color: rgba(239,68,68,.4); }

    /* ── System-Info ─────────────────────────────────────── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .info-item {
      background: rgba(0,0,0,.3);
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
    }
    .info-item label {
      display: block;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .info-item value {
      font-family: var(--font-mono);
      font-size: .85rem;
      color: var(--accent);
    }

    /* ── Steuerleiste unten ──────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: rgba(56,189,248,.1); border-color: var(--accent); color: var(--accent); }
    .btn:active { transform: scale(.96); }
    .btn.danger:hover { background: rgba(239,68,68,.1); border-color: var(--off); color: var(--off); }

    /* Auto-Refresh Toggle */
    .auto-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-size: .8rem;
      color: var(--muted);
      cursor: pointer;
    }
    .auto-label input { accent-color: var(--accent); }

    /* ── Toast-Meldungen ─────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 20px; right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      padding: 10px 16px;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: .78rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      animation: slideIn .3s ease, fadeOut .3s ease 2.5s forwards;
      max-width: 280px;
    }
    .toast.ok  { border-color: rgba(34,197,94,.4);  color: var(--on); }
    .toast.err { border-color: rgba(239,68,68,.4);  color: var(--off); }
    @keyframes slideIn  { from { opacity:0; transform:translateX(20px); } }
    @keyframes fadeOut  { to   { opacity:0; transform:translateX(20px); } }

    /* ── Lade-Overlay ────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      z-index: 100;
      transition: opacity .5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spin {
      width: 44px; height: 44px;
      border: 3px solid var(--surface);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: rot 1s linear infinite;
    }
    @keyframes rot { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: .9rem; font-family: var(--font-mono); }
  </style>
</head>
<body>

<!-- Lade-Overlay -->
<div id="loading">
  <div class="spin"></div>
  <p>Verbinde mit ESP32…</p>
</div>

<!-- Toast-Behälter -->
<div id="toast-container"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo">⚡</div>
    <h1>GPIO Master <small>ESP32-S3 · WebUI</small></h1>
    <div id="conn-badge">● Verbinde…</div>
  </header>

  <!-- Outputs -->
  <div class="card">
    <div class="card-title">▶ Digital Outputs</div>
    <div id="outputs-container"><!-- dynamisch gefüllt --></div>
  </div>

  <!-- PWM -->
  <div class="card">
    <div class="card-title">〜 PWM Outputs</div>
    <div id="pwm-container"><!-- dynamisch gefüllt --></div>
  </div>

  <!-- Inputs -->
  <div class="card">
    <div class="card-title">◀ Digital Inputs</div>
    <div id="inputs-container"><!-- dynamisch gefüllt --></div>
  </div>

  <!-- System-Info -->
  <div class="card">
    <div class="card-title">ℹ System Info</div>
    <div class="info-grid">
      <div class="info-item"><label>IP-Adresse</label><value id="info-ip">—</value></div>
      <div class="info-item"><label>Hostname</label><value id="info-host">—</value></div>
      <div class="info-item"><label>RSSI</label><value id="info-rssi">—</value></div>
      <div class="info-item"><label>Uptime</label><value id="info-uptime">—</value></div>
      <div class="info-item"><label>Freier Heap</label><value id="info-heap">—</value></div>
      <div class="info-item"><label>Chip</label><value id="info-chip">—</value></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn" onclick="refreshAll()">⟳ Aktualisieren</button>
    <button class="btn danger" onclick="allOff()">✕ Alles aus</button>
    <label class="auto-label">
      <input type="checkbox" id="auto-refresh" checked>
      Auto (5 s)
    </label>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════
//  ESP32 GPIO Master — Frontend Logic
//  Basis-URL wird automatisch aus window.location ermittelt
// ═══════════════════════════════════════════════════════════

// Wenn die Seite direkt von GitHub geladen wird (Test):
// API_BASE auf den ESP32 zeigen lassen, z.B.:
//   const API_BASE = 'http://192.168.1.42';
// Im normalen Betrieb (via ESP32-Shell) ist das automatisch korrekt:
const API_BASE = window.location.origin.startsWith('http://') ||
                 window.location.hostname !== 'localhost' &&
                 !window.location.hostname.includes('github')
  ? window.location.origin   // Seite läuft vom ESP32 → relative Basis
  : 'http://esp32gpio.local'; // Fallback für direkten GitHub-Aufruf

let outputPins = [];  // { pin, label }
let inputPins  = [];  // { pin, label }
let pwmValues  = {};  // pin → duty
let autoTimer  = null;

// ── Toast ────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Fetch-Wrapper mit Fehlerbehandlung ───────────────────
async function api(path) {
  const r = await fetch(API_BASE + path);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── Pin-Konfiguration vom ESP32 laden ───────────────────
async function loadConfig() {
  const data = await api('/status');
  outputPins = data.pins.filter(p => p.output);
  inputPins  = data.pins.filter(p => !p.output);
  renderOutputs();
  renderPWM();
  renderInputs();
}

// ── Output-Karten rendern ────────────────────────────────
function renderOutputs() {
  const c = document.getElementById('outputs-container');
  if (!outputPins.length) { c.innerHTML = '<p style="color:var(--muted);font-size:.85rem">Keine Output-Pins konfiguriert</p>'; return; }
  c.innerHTML = outputPins.map(p => `
    <div class="pin-row">
      <div class="led" id="led-${p.pin}"></div>
      <div class="pin-label">
        <strong>${p.label}</strong>
        <span>GPIO ${p.pin}</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="tog-${p.pin}"
               onchange="setPin(${p.pin}, this.checked ? 1 : 0)"
               ${p.value ? 'checked' : ''}>
        <div class="toggle-track"></div>
      </label>
    </div>`).join('');
  outputPins.forEach(p => updateLed(p.pin, p.value));
}

// ── PWM-Karten rendern ───────────────────────────────────
function renderPWM() {
  const c = document.getElementById('pwm-container');
  if (!outputPins.length) { c.innerHTML = '<p style="color:var(--muted);font-size:.85rem">Keine PWM-Pins konfiguriert</p>'; return; }
  c.innerHTML = outputPins.map(p => `
    <div class="pin-row">
      <div class="pin-label">
        <strong>${p.label}</strong>
        <span>GPIO ${p.pin}</span>
      </div>
      <div class="pwm-wrap">
        <input type="range" min="0" max="255" value="${pwmValues[p.pin] || 0}"
               id="pwm-${p.pin}"
               oninput="document.getElementById('pv-${p.pin}').textContent=this.value"
               onchange="setPWM(${p.pin}, this.value)">
        <span class="pwm-val" id="pv-${p.pin}">${pwmValues[p.pin] || 0}</span>
      </div>
    </div>`).join('');
}

// ── Input-Karten rendern ─────────────────────────────────
function renderInputs() {
  const c = document.getElementById('inputs-container');
  if (!inputPins.length) { c.innerHTML = '<p style="color:var(--muted);font-size:.85rem">Keine Input-Pins konfiguriert</p>'; return; }
  c.innerHTML = inputPins.map(p => `
    <div class="input-row">
      <div class="led" id="led-in-${p.pin}"></div>
      <div class="pin-label" style="flex:1">
        <strong>${p.label}</strong>
        <span>GPIO ${p.pin}</span>
      </div>
      <div class="input-val" id="ival-${p.pin}">—</div>
    </div>`).join('');
  inputPins.forEach(p => updateInput(p.pin, p.value));
}

// ── LED-Zustand aktualisieren ────────────────────────────
function updateLed(pin, state) {
  const el = document.getElementById('led-' + pin);
  if (el) { el.className = 'led ' + (state ? 'on' : 'off'); }
  const tog = document.getElementById('tog-' + pin);
  if (tog) tog.checked = !!state;
}

function updateInput(pin, val) {
  const el = document.getElementById('ival-' + pin);
  if (el) {
    el.textContent = val ? 'HIGH (1)' : 'LOW  (0)';
    el.className = 'input-val ' + (val ? 'high' : 'low');
  }
  const led = document.getElementById('led-in-' + pin);
  if (led) led.className = 'led ' + (val ? 'on' : 'off');
}

// ── API-Aktionen ─────────────────────────────────────────
async function setPin(pin, state) {
  try {
    await api(`/set?pin=${pin}&state=${state}`);
    updateLed(pin, state);
    toast(`GPIO ${pin} → ${state ? 'EIN' : 'AUS'}`);
  } catch (e) {
    toast('Fehler: ' + e.message, 'err');
  }
}

async function setPWM(pin, duty) {
  try {
    await api(`/pwm?pin=${pin}&duty=${duty}`);
    pwmValues[pin] = duty;
    toast(`PWM GPIO ${pin} → ${duty}/255`);
  } catch (e) {
    toast('Fehler: ' + e.message, 'err');
  }
}

async function refreshInputs() {
  for (const p of inputPins) {
    try {
      const d = await api(`/read?pin=${p.pin}`);
      updateInput(p.pin, d.value);
    } catch {}
  }
}

async function refreshInfo() {
  try {
    const d = await api('/info');
    document.getElementById('info-ip').textContent    = d.ip;
    document.getElementById('info-host').textContent  = d.hostname;
    document.getElementById('info-rssi').textContent  = d.rssi + ' dBm';
    document.getElementById('info-uptime').textContent= formatUptime(d.uptime);
    document.getElementById('info-heap').textContent  = (d.heap / 1024).toFixed(1) + ' KB';
    document.getElementById('info-chip').textContent  = d.chip;
  } catch {}
}

function formatUptime(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return `${h}h ${m}m`;
}

async function refreshAll() {
  await refreshInputs();
  await refreshInfo();
}

async function allOff() {
  for (const p of outputPins) await setPin(p.pin, 0);
}

// ── Verbindungsstatus ─────────────────────────────────────
async function checkConnection() {
  const badge = document.getElementById('conn-badge');
  try {
    await api('/info');
    badge.textContent = '● Online';
    badge.className = 'online';
  } catch {
    badge.textContent = '● Offline';
    badge.className = 'offline';
  }
}

// ── Auto-Refresh ──────────────────────────────────────────
document.getElementById('auto-refresh').addEventListener('change', function() {
  if (this.checked) startAuto(); else { clearInterval(autoTimer); autoTimer = null; }
});

function startAuto() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(async () => {
    await refreshInputs();
    await checkConnection();
  }, 5000);
}

// ── Start ─────────────────────────────────────────────────
(async () => {
  try {
    await loadConfig();
    await refreshInfo();
    await checkConnection();
    document.getElementById('loading').classList.add('hidden');
    startAuto();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="text-align:center;color:#ef4444;padding:24px">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        <strong>ESP32 nicht erreichbar</strong><br>
        <span style="color:#64748b;font-size:.85rem">API_BASE: ${API_BASE}<br>${e}</span>
      </div>`;
  }
})();
</script>
</body>
</html>
