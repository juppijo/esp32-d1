<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ESP32 UI</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* Mini Status oben (fast unsichtbar) */
  #topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 20px;
    background: rgba(0,0,0,0.3);
    color: #38bdf8;
    font-size: 10px;
    text-align: center;
    z-index: 10;
  }

  /* Hauptbereich */
  #app {
    margin: 20;
    padding: 20;
    position: fixed;
    top: 10;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>
</head>

<body>

<div id="app"></div>

<script>
const url = "https://juppijo.github.io/esp32-d1/RGB_LED/index.html";

// AUTOMATISCH laden
fetch(url)
  .then(res => res.text())
  .then(html => {
    document.getElementById("app").innerHTML = html;
  })
  .catch(err => {
    document.getElementById("app").innerHTML =
      "<div style='color:red;text-align:center;margin-top:40px;'>⚠️ CORS Fehler</div>";
  });
</script>

</body>
</html>
