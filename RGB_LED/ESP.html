<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ESP32-LDC</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* Mini Status oben (fast unsichtbar) */
  #topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 20px;
    background: rgba(0,0,0,0.3);
    color: #38bdf8;
    font-size: 10px;
    text-align: center;
    z-index: 10;
  }

  /* Hauptbereich */
  #app {
    margin: 20;
    padding: 20;
    position: fixed;
    top: 10;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .fullscreen-btn {
    padding:10px 10px; margin:10px; border:none; border-radius:8px; font-size:1.4rem; 
    cursor:pointer; font-weight:bold; transition: 0.3s;
    background: rgba(155,155,180,0.5);
    box-shadow: 0 0 10px rgba(185,185,205,0.2);
  }
  .fullscreen-btn:hover {
    transform: scale(1.05);
  }
  .fullscreen-btn {
    position: fixed;
    top: 5px;
    right: 15px;
    z-index: 1000;
  }
</style>
</head>

<body>
<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
<div id="topbar">ESP32-S3 verbunden</div>
<div id="app"></div>

<script>
  // 1. Zuerst die Funktionen definieren, damit sie bekannt sind
  function toggleFullscreen() {
    let elem = document.documentElement;
    if (!document.fullscreenElement) {
      if (elem.requestFullscreen) { elem.requestFullscreen(); }
      else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
    } else {
      if (document.exitFullscreen) { document.exitFullscreen(); }
    }
  }

  // 2. Dann die externen Inhalte laden
  const url = "https://juppijo.github.io/esp32-d1/RGB_LED/index.html";
  
  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error("Server antwortet nicht");
      return res.text();
    })
    .then(html => {
      document.getElementById("app").innerHTML = html;
      console.log("GitHub Content geladen");
    })
    .catch(err => {
      document.getElementById("app").innerHTML = 
        "<div style='color:red; text-align:center; padding:20px;'>⚠️ Fehler beim Laden von GitHub: " + err.message + "</div>";
    });
</script>

</body>
</html>
